<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Country Admin</title>

  <link rel="stylesheet" href="admin.css">

</head>

<body>

  <div class="background"></div>

  <!-- MENU -->

  <button id="menuToggle">
    ☰
  </button>

  <div class="admin-layout">

    <!-- SIDEBAR -->

    <aside class="sidebar"
           id="sidebar">

      <div>

        <h1>
          Country
        </h1>

        <p>
          Panel de Supervisión
        </p>

      </div>

      <div class="sidebar-box">

        <span id="totalRegistros">
          0
        </span>

        Informes Totales

      </div>

      <div class="sectores">

        <button class="sector-btn active"
                data-sector="Campo">
          🌱 Campo
        </button>

        <button class="sector-btn"
                data-sector="Electricidad">
          ⚡ Electricidad
        </button>

        <button class="sector-btn"
                data-sector="Plomeria">
          🚰 Plomeria
        </button>

        <button class="sector-btn"
                data-sector="Tecnica">
          🛠 Tecnica
        </button>

        <button class="sector-btn"
                data-sector="Mantenimiento">
          🔧 Mantenimiento
        </button>

        <button class="sector-btn"
                data-sector="Taller">
          🚗 Taller
        </button>

      </div>

      <!-- BOTTOM -->

      <div class="sidebar-bottom">

        <button id="exportarSeleccionados">
          📄 Exportar
        </button>

        <button id="borrarSeleccionados">
          🗑 Eliminar
        </button>

        <div class="theme-box">

          <span>
            🌙 Tema Oscuro
          </span>

          <label class="switch">

            <input
              type="checkbox"
              id="themeToggle"
            >

            <span class="slider"></span>

          </label>

        </div>

      </div>

    </aside>

    <!-- MAIN -->

    <main class="admin-main"
          id="adminMain">

      <div class="top-panel">

        <div class="top-info">

          <h2>
            Informes
          </h2>

          <p>
            Registros en tiempo real
          </p>

        </div>

        <div class="filtros">

          <input
            type="text"
            id="buscador"
            placeholder="Buscar trabajador..."
          >

          <select id="filtroEstado">

            <option value="Todos">
              Todos
            </option>

            <option value="Urgente">
              Urgente
            </option>

            <option value="En Proceso">
              En Proceso
            </option>

            <option value="Resuelto">
              Resuelto
            </option>

          </select>

          <select id="filtroFecha">

            <option value="">
              Fecha
            </option>

          </select>

          <div class="fecha-actual"
               id="fechaActual">

          </div>

        </div>

      </div>

      <div id="contenedorRegistros"></div>

    </main>

  </div>

  <script type="module"
          src="admin.js">

  </script>

</body>
</html>
