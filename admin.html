<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Country Admin</title>

  <link rel="stylesheet" href="admin.css">

</head>

<body>

  <div class="background"></div>

  <div class="admin-layout">

    <!-- SIDEBAR -->

    <aside class="sidebar">

      <h1>
        Country Admin
      </h1>

      <p class="sidebar-sub">
        Supervisión General
      </p>

      <div class="sidebar-box">

        <span id="totalRegistros">
          0
        </span>

        registros

      </div>

      <div class="sectores">

        <button class="sector-btn active"
                data-sector="Campo">

          🌱 Campo

        </button>

        <button class="sector-btn"
                data-sector="Electricidad">

          ⚡ Electricidad

        </button>

        <button class="sector-btn"
                data-sector="Plomeria">

          🚰 Plomeria

        </button>

        <button class="sector-btn"
                data-sector="Tecnica">

          🛠 Tecnica

        </button>

        <button class="sector-btn"
                data-sector="MantenimientoGeneral">

          🔧 Mantenimiento

        </button>

        <button class="sector-btn"
                data-sector="TallerMecánico">

          🚗 Taller

        </button>

      </div>

    </aside>

    <!-- MAIN -->

    <main class="admin-main">

      <div class="admin-top">

        <div>

          <h2>
            Informes
          </h2>

          <p>
            Registros en tiempo real
          </p>

        </div>

        <input
          type="text"
          id="buscador"
          placeholder="Buscar trabajador..."
        >

      </div>

      <div id="contenedorRegistros"></div>

    </main>

  </div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

  getFirestore,
  collection,
  onSnapshot,
  query,
  orderBy

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// LOGIN

const password =
  prompt("Contraseña");

if(password !== "country2026"){

  document.body.innerHTML = `

    <div class="login-error">

      Contraseña incorrecta

    </div>

  `;

  throw new Error("Sin acceso");

}

// FIREBASE

const firebaseConfig = {

  apiKey: "AIzaSyDVI76qVw8v00Kr6sG537oIP2yw4AdR5-g",

  authDomain: "contry-c4953.firebaseapp.com",

  projectId: "contry-c4953",

  storageBucket: "contry-c4953.firebasestorage.app",

  messagingSenderId: "775091873432",

  appId: "1:775091873432:web:93331d930a4aa1063c52ed"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

// ELEMENTOS

const contenedor =
  document.getElementById("contenedorRegistros");

const total =
  document.getElementById("totalRegistros");

const buscador =
  document.getElementById("buscador");

const botonesSector =
  document.querySelectorAll(".sector-btn");

// VARIABLES

let registros = [];

let sectorActual = "Campo";

// CAMBIAR SECTOR

botonesSector.forEach((boton) => {

  boton.addEventListener("click", () => {

    botonesSector.forEach((b) =>
      b.classList.remove("active")
    );

    boton.classList.add("active");

    sectorActual =
      boton.dataset.sector;

    filtrar();

  });

});

// MOSTRAR

function mostrarRegistros(lista){

  contenedor.innerHTML = "";

  total.innerHTML =
    lista.length;

  lista.forEach((registro) => {

    let colorEstado = "#2563eb";

    if(registro.estado === "Observacion"){
      colorEstado = "#eab308";
    }

    if(registro.estado === "Urgente"){
      colorEstado = "#ef4444";
    }

    contenedor.innerHTML += `

      <div class="registro-card">

        <div class="registro-header">

          <div>

            <h3>
              ${registro.nombre}
            </h3>

            <div class="sector-mini">

              ${registro.sector}

            </div>

          </div>

          <span
            class="estado"
            style="background:${colorEstado}"
          >

            ${registro.estado}

          </span>

        </div>

        <div class="descripcion">

          ${registro.descripcion}

        </div>

        <div class="info">

          <p>
            📍 ${registro.coordenadas}
          </p>

          <p>
            🕒 ${registro.fecha}
          </p>

        </div>

        ${registro.imagen ? `

          <a
            href="${registro.imagen}"
            target="_blank"
          >

            <img
              src="${registro.imagen}"
              class="preview-img"
            >

          </a>

        ` : ""}

      </div>

    `;

  });

}

// FILTRAR

function filtrar(){

  const texto =
    buscador.value.toLowerCase();

  const filtrados = registros.filter(

    (r) =>

      r.sector === sectorActual &&

      r.nombre
      .toLowerCase()
      .includes(texto)

  );

  mostrarRegistros(filtrados);

}

// BUSCADOR

buscador.addEventListener("input", () => {

  filtrar();

});

// FIREBASE REALTIME

const q = query(

  collection(db, "registros"),

  orderBy("fecha", "desc")

);

onSnapshot(q, (snapshot) => {

  registros = [];

  snapshot.forEach((doc) => {

    registros.push(doc.data());

  });

  filtrar();

});

</script>

</body>
</html>
