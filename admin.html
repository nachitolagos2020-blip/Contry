<!DOCTYPE html>
      <h1>Country</h1>
      <p>Panel de Supervisión</p>
    </div>

    <div class="sidebar-box">
      <span id="totalRegistros">0</span>
      Informes Totales
    </div>

    <div class="theme-box">
      <button id="toggleTheme">
        🌙 / ☀️ Cambiar Tema
      </button>
    </div>

    <div class="sectores">

      <button class="sector-btn active" data-sector="Campo">
        🌱 Campo
      </button>

      <button class="sector-btn" data-sector="Electricidad">
        ⚡ Electricidad
      </button>

      <button class="sector-btn" data-sector="Plomeria">
        🚰 Plomeria
      </button>

      <button class="sector-btn" data-sector="Tecnica">
        🛠 Tecnica
      </button>

      <button class="sector-btn" data-sector="Mantenimiento">
        🔧 Mantenimiento
      </button>

      <button class="sector-btn" data-sector="Taller">
        🚗 Taller
      </button>

    </div>

  </aside>

  <main class="admin-main" id="adminMain">

    <div class="top-panel">

      <div class="top-info">
        <h2>Informes</h2>
        <p>Registros en tiempo real</p>
      </div>

      <div class="filtros">

        <input
          type="text"
          id="buscador"
          placeholder="Buscar trabajador..."
        >

        <select id="filtroEstado">
          <option value="Todos">Todos</option>
          <option value="Ok">Ok</option>
          <option value="Observacion">Observacion</option>
          <option value="Urgente">Urgente</option>
          <option value="Finalizado">Finalizado</option>
        </select>

        <input type="date" id="filtroFecha">

        <button id="exportarPDF" class="action-btn">
          📄 Exportar PDF
        </button>

        <div class="fecha-actual" id="fechaActual"></div>

      </div>

    </div>

    <div id="contenedorRegistros"></div>

  </main>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
