<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Country Admin</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="background"></div>

<div class="admin-layout" id="layout">

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <button class="toggle-btn"
            id="toggleMenu">

      ☰

    </button>

    <h1>
      Country Admin
    </h1>

    <p class="sidebar-sub">
      Supervisión General
    </p>

    <div class="sidebar-box">

      <span id="totalRegistros">
        0
      </span>

      registros

    </div>

    <div class="sectores">

      <button class="sector-btn active"
              data-sector="Campo">

        🌱 <span>Campo</span>

      </button>

      <button class="sector-btn"
              data-sector="Electricidad">

        ⚡ <span>Electricidad</span>

      </button>

      <button class="sector-btn"
              data-sector="Plomeria">

        🚰 <span>Plomeria</span>

      </button>

      <button class="sector-btn"
              data-sector="Tecnica">

        🛠 <span>Tecnica</span>

      </button>

      <button class="sector-btn"
              data-sector="MantenimientoGeneral">

        🔧 <span>Mantenimiento</span>

      </button>

      <button class="sector-btn"
              data-sector="TallerMecanico">

        🚗 <span>Taller</span>

      </button>

    </div>

  </aside>

  <!-- MAIN -->

  <main class="admin-main">

    <div class="admin-top">

      <div>

        <h2>
          Informes
        </h2>

        <p>
          Registros en tiempo real
        </p>

      </div>

      <div class="top-right">

        <input
          type="text"
          id="buscador"
          placeholder="Buscar trabajador..."
        >

        <select id="filtroEstado">

          <option value="">
            Todos
          </option>

          <option value="Ok">
            Ok
          </option>

          <option value="Observacion">
            Observación
          </option>

          <option value="Urgente">
            Urgente
          </option>

        </select>

        <label class="fecha-box">

          📅 Fecha

          <input
            type="date"
            id="filtroFecha"
          >

        </label>

        <div class="hora-actual"
             id="horaActual">

        </div>

      </div>

    </div>

    <div id="contenedorRegistros"></div>

  </main>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
