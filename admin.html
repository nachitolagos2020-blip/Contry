<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Panel Admin</title>

  <link rel="stylesheet" href="admin.css">

</head>

<body>

  <div class="background"></div>

  <div class="admin-layout">

    <aside class="sidebar">

      <h1>Country Admin</h1>

      <p>
        Supervisión general
      </p>

      <div class="sidebar-box">

        <span id="totalRegistros">
          0
        </span>

        registros

      </div>

    </aside>

    <main class="admin-main">

      <div class="admin-top">

        <div>

          <h2>Respuestas</h2>

          <p>
            Registro completo de trabajadores
          </p>

        </div>

        <input
          type="text"
          id="buscador"
          placeholder="Buscar trabajador..."
        >

      </div>

      <div id="contenedorRegistros"></div>

    </main>

  </div>

 <script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

  getFirestore,
  collection,
  getDocs

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// FIREBASE

const firebaseConfig = {

  apiKey: "AIzaSyDVI76qVw8v00Kr6sG537oIP2yw4AdR5-g",

  authDomain: "contry-c4953.firebaseapp.com",

  projectId: "contry-c4953",

  storageBucket: "contry-c4953.firebasestorage.app",

  messagingSenderId: "775091873432",

  appId: "1:775091873432:web:93331d930a4aa1063c52ed"

};

// INICIAR

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

// ELEMENTOS

const contenedor =
  document.getElementById("contenedorRegistros");

const total =
  document.getElementById("totalRegistros");

const buscador =
  document.getElementById("buscador");

// CARGAR

let registros = [];

async function cargarRegistros() {

  const querySnapshot =

    await getDocs(
      collection(db,"registros")
    );

  registros = [];

  querySnapshot.forEach((doc) => {

    registros.push(doc.data());

  });

  mostrarRegistros(registros);

}

function mostrarRegistros(lista) {

  contenedor.innerHTML = "";

  total.innerHTML = lista.length;

  lista.reverse().forEach((registro) => {

    contenedor.innerHTML += `

      <div class="registro-card">

        <div class="registro-header">

          <h3>${registro.nombre}</h3>

          <span>${registro.estado}</span>

        </div>

        <p class="descripcion">

          ${registro.descripcion}

        </p>

        <div class="info">

          <p>
            📍 ${registro.coordenadas}
          </p>

          <p>
            🕒 ${registro.fecha}
          </p>
        </div>

      </div>
     ${registro.imagen ? `

  <a
    href="${registro.imagen}"
    target="_blank"
  >

    <img
      src="${registro.imagen}"
      class="preview-img"
    >

  </a>

` : ""}
    `;

  });

}

// BUSCADOR

buscador.addEventListener("input", () => {

  const texto =
    buscador.value.toLowerCase();

  const filtrados = registros.filter(

    (r) =>

      r.nombre
      .toLowerCase()
      .includes(texto)

  );

  mostrarRegistros(filtrados);

});

// INICIAR

cargarRegistros();

</script>

</body>
</html>
